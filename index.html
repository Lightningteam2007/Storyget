<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="اشتورم‌گلانتس: جنگ زنده - بازی استراتژیک فرماندهی ورماخت در جبهه شرق">
    <title>⚔ اشتورم‌گلانتس: جنگ زنده</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel-bg: #141414;
            --border: #2a2a2a;
            --gold: #b8942e;
            --red: #7a1515;
            --text: #b0b0b0;
            --text-light: #e0e0e0;
            --font: 'Segoe UI', 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        #top-bar {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            min-height: 40px;
            flex-shrink: 0;
        }

        #top-bar .title {
            font-size: 1.1em;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--gold);
            text-shadow: 0 0 8px rgba(184,148,46,0.3);
        }

        #top-bar .resources {
            display: flex;
            gap: 8px;
            font-size: 0.78em;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 7px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 2px;
        }

        .resource-label {
            color: #777;
            font-size: 0.7em;
        }

        .resource-value {
            color: var(--text-light);
            font-weight: bold;
        }

        #main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a100a;
            cursor: crosshair;
        }

        #game-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: auto;
        }

        #side-panel {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            z-index: 50;
            font-size: 0.82em;
        }

        #minimap-container {
            width: 100%;
            height: 130px;
            border-bottom: 1px solid var(--border);
            position: relative;
            flex-shrink: 0;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #info-panel {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #info-panel h3 {
            color: var(--gold);
            margin-bottom: 6px;
            font-size: 1em;
            letter-spacing: 1px;
        }

        #info-details {
            font-size: 0.8em;
            line-height: 1.7;
        }

        #action-panel {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 3px 0;
            background: #1e1e1e;
            color: var(--text-light);
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.8em;
            transition: all 0.15s;
            text-align: center;
            border-radius: 2px;
        }

        .btn:hover {
            background: #2a2a2a;
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn:active {
            background: #111;
            transform: scale(0.98);
        }

        .btn.primary {
            background: var(--red);
            border-color: #9a1a1a;
            color: #fff;
        }

        .btn.primary:hover {
            background: #8a1515;
            box-shadow: 0 0 10px rgba(122,21,21,0.4);
        }

        .btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        #unit-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .unit-card {
            background: #111;
            border: 1px solid var(--border);
            padding: 6px 8px;
            margin-bottom: 3px;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.12s;
            border-radius: 2px;
        }

        .unit-card:hover {
            border-color: var(--gold);
            background: #1a1a1a;
        }

        .unit-card.selected {
            border-color: var(--gold);
            background: #1e1808;
        }

        .unit-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unit-card-name {
            color: var(--text-light);
            font-weight: bold;
        }

        .unit-card-type {
            font-size: 0.7em;
            color: #777;
        }

        .unit-card-stats {
            display: flex;
            gap: 8px;
            margin-top: 3px;
            font-size: 0.7em;
        }

        .stat.health { color: #5a8; }
        .stat.attack { color: #c55; }
        .stat.defense { color: #58c; }
        .stat.movement { color: #ca5; }

        #log-panel {
            height: 100px;
            border-top: 1px solid var(--border);
            padding: 6px;
            overflow-y: auto;
            font-size: 0.7em;
            flex-shrink: 0;
            background: #0a0a0a;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #111;
            color: #888;
        }

        .log-entry.combat { color: #c55; }
        .log-entry.move { color: #58c; }
        .log-entry.system { color: var(--gold); }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #overlay.hidden { display: none; }

        #modal {
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            padding: 30px;
            text-align: center;
            max-width: 480px;
            border-radius: 3px;
        }

        #modal h2 {
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 16px;
            font-size: 1.4em;
        }

        #modal p {
            margin: 6px 0;
            line-height: 1.9;
        }

        @media (max-width: 768px) {
            #side-panel {
                width: 240px;
                font-size: 0.75em;
            }
            #top-bar .title {
                font-size: 0.9em;
            }
        }

        @media (max-width: 500px) {
            #main-layout {
                flex-direction: column;
            }
            #side-panel {
                width: 100%;
                height: 40%;
                border-right: none;
                border-top: 1px solid var(--border);
            }
            #minimap-container {
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="top-bar">
            <div class="title">⚔ اشتورم‌گلانتس</div>
            <div class="resources">
                <div class="resource-item">
                    <span class="resource-label">منابع</span>
                    <span class="resource-value" id="res-rp">۶۰۰</span>
                </div>
                <div class="resource-item">
                    <span class="resource-label">سوخت</span>
                    <span class="resource-value" id="res-fuel">۳۵۰</span>
                </div>
                <div class="resource-item">
                    <span class="resource-label">مهمات</span>
                    <span class="resource-value" id="res-ammo">۲۵۰</span>
                </div>
                <div class="resource-item">
                    <span class="resource-label">نوبت</span>
                    <span class="resource-value" id="res-turn">۱</span>
                </div>
            </div>
        </div>
        <div id="main-layout">
            <div id="side-panel">
                <div id="minimap-container">
                    <canvas id="minimap-canvas"></canvas>
                </div>
                <div id="info-panel">
                    <h3 id="info-title">⚡ قرارگاه فرماندهی</h3>
                    <div id="info-details">یک یگان انتخاب کنید.</div>
                </div>
                <div id="action-panel">
                    <button class="btn primary" id="btn-end-turn">⏭ پایان نوبت</button>
                    <button class="btn" id="btn-center-hq">📍 مرکز فرماندهی</button>
                    <button class="btn" id="btn-save-game">💾 ذخیره نبرد</button>
                </div>
                <div id="unit-list"></div>
                <div id="log-panel"></div>
            </div>
            <div id="canvas-container">
                <canvas id="game-canvas"></canvas>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="modal">
            <h2>⚔ اشتورم‌گلانتس ⚔</h2>
            <p>جنگ زنده</p>
            <p style="color:#999;">جبهه شرق - ۱۹۴۴</p>
            <p>شما فرماندهی نیروهای باقی‌مانده ورماخت را<br>در برابر پیشروی ارتش سرخ بر عهده دارید.</p>
            <p style="color:var(--red);font-size:0.9em;">سرزمین پدری دیگر نمی‌تواند کمکی بکند.</p>
            <p style="color:#999;font-size:0.75em;">تنها شما مانده‌اید و سربازانتان.</p>
            <button class="btn primary" id="btn-start-game" style="margin-top:18px;font-size:1.05em;">
                ⚡ آغاز نبرد ⚡
            </button>
            <button class="btn" id="btn-load-game" style="margin-top:8px;font-size:0.85em;">
                📂 ادامه نبرد قبلی
            </button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('⚡ Service Worker ثبت شد:', reg.scope);
                }).catch(err => {
                    console.log('Service Worker:', err);
                });
            });
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/eventbus.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/core.js"></script>
    <script src="js/map.js"></script>
    <script src="js/units.js"></script>
    <script src="js/combat.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/campaign.js"></script>
    <script src="js/narrative.js"></script>
    <script src="js/systems.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/main.js"></script>
</body>
  </html>
